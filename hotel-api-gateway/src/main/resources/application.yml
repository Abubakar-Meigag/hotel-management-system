server:
  port: 8080

spring:
  application:
    name: hotel-api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: room-service
            uri: http://room-service:8081
            predicates:
              - Path=/api/rooms/**

          - id: booking-service
            uri: http://booking-service:8082
            predicates:
              - Path=/api/bookings/**

          - id: guest-service
            uri: http://guest-service:8083
            predicates:
              - Path=/api/guests/**

          - id: housekeeping-service
            uri: http://housekeeping-service:8084
            predicates:
              - Path=/api/housekeeping/**

          - id: billing-service
            uri: http://billing-service:8085
            predicates:
              - Path=/api/billing/**

          - id: notification-service
            uri: http://notification-service:8086
            predicates:
              - Path=/api/notifications/**
