server:
  port: 8080

spring:
  application:
    name: hotel-api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: room-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/rooms/**

          - id: booking-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/bookings/**

          - id: guest-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/guests/**

          - id: housekeeping-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/housekeeping/**

          - id: billing-service
            uri: http://localhost:8085
            predicates:
              - Path=/api/billing/**

          - id: notification-service
            uri: http://localhost:8086
            predicates:
              - Path=/api/notifications/**
